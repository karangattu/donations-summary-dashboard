name: React Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6.0.2
    - name: Use Node.js
      uses: actions/setup-node@v6.4.0
      with:
        node-version: '24.x'
        cache: 'npm'
    - run: npm ci
    - run: npm run test:ci
